name: Deploy to DigitalOcean

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            whoami
            echo "HOSTNAME=$(hostname)"
            cd /opt/job || echo "DIR_NOT_FOUND"
            git pull origin master 2>&1 || echo "GIT_PULL_FAILED"
            bash /root/fix-job-connect.sh 2>&1 || echo "FIX_SCRIPT_FAILED"
            docker compose -f docker-compose.job.yml up --build -d 2>&1 || echo "DOCKER_FAILED"